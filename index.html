<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');

    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    let score = 0;
    let gameActive = true;
    let imagesLoaded = 0;

    // Load Images
    const img1 = new Image(); 
    img1.src = 'char1.png';
    img1.onload = () => { imagesLoaded++; checkStart(); };

    const img2 = new Image(); 
    img2.src = 'char2.png';
    img2.onload = () => { imagesLoaded++; checkStart(); };

    const charA = { x: canvas.width * 0.25, y: canvas.height - 150, active: true, size: 80 };
    const charB = { x: canvas.width * 0.75, y: canvas.height - 150, active: true, size: 80 };

    const obstacles = [];

    function checkStart() {
        if (imagesLoaded === 2) {
            spawnObstacle();
            update();
        }
    }

    // Handle Touch
    window.addEventListener('touchmove', (e) => {
        e.preventDefault(); // Prevents the screen from bouncing/scrolling
        for (let i = 0; i < e.touches.length; i++) {
            let touch = e.touches[i];
            if (touch.clientX < canvas.width / 2 && charA.active) {
                charA.x = touch.clientX;
            } 
            else if (touch.clientX >= canvas.width / 2 && charB.active) {
                charB.x = touch.clientX;
            }
        }
    }, { passive: false });

    function spawnObstacle() {
        if (!gameActive) return;
        obstacles.push({
            x: Math.random() * canvas.width,
            y: -50,
            size: 40,
            speed: 4 + (score / 100)
        });
        setTimeout(spawnObstacle, 1000 - Math.min(score * 2, 600));
    }

    function update() {
        if (!gameActive) return;

        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Draw Characters
        if (charA.active) ctx.drawImage(img1, charA.x - 40, charA.y, charA.size, charA.size);
        if (charB.active) ctx.drawImage(img2, charB.x - 40, charB.y, charB.size, charB.size);

        // Handle Obstacles
        for (let i = obstacles.length - 1; i >= 0; i--) {
            let o = obstacles[i];
            o.y += o.speed;

            ctx.fillStyle = '#ff8a80';
            ctx.beginPath();
            ctx.arc(o.x, o.y, 15, 0, Math.PI * 2);
            ctx.fill();

            if (charA.active && checkCollision(charA, o)) charA.active = false;
            if (charB.active && checkCollision(charB, o)) charB.active = false;

            if (o.y > canvas.height) obstacles.splice(i, 1);
        }

        if (!charA.active && !charB.active) {
            gameActive = false;
            alert("Connection lost. Score: " + Math.floor(score));
            location.reload();
        }

        score += 0.1;
        scoreEl.innerText = Math.floor(score);
        requestAnimationFrame(update);
    }

    function checkCollision(char, obs) {
        let dx = char.x - obs.x;
        let dy = (char.y + 40) - obs.y;
        let distance = Math.sqrt(dx * dx + dy * dy);
        return distance < 45; 
    }
</script>
